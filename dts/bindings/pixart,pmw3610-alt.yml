description: |
  Sensor driver for the pixart PMW3610 mouse sensor 

compatible: "pixart,pmw3610-alt"

include: spi-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true
  cpi:
    type: int
    default: 600
    description: "CPI value (Range: 200 - 3200, Step: 200)"
  swap-xy:
    type: boolean
  invert-x:
    type: boolean
  invert-y:
    type: boolean
  evt-type:
    type: int
    required: true
  x-input-code:
    type: int
    required: true
  y-input-code:
    type: int
    required: true
  force-awake:
    type: boolean
  force-awake-4ms-mode:
    type: boolean
  scroll-layers:
    type: array
    description: |
      Layer numbers that activate scroll mode.
      Driver emits WHEEL/HWHEEL instead of REL_X/REL_Y.
      Speed controlled by CONFIG_PMW3610_ALT_SCROLL_TICK.
      Example: scroll-layers = <5>;
  snipe-layers:
    type: array
    description: |
      Layer numbers that activate snipe (precision) mode.
      Driver divides cursor movement by CONFIG_PMW3610_ALT_SNIPE_CPI_DIVIDOR,
      with remainder carry-over for lossless precision.
      Example: snipe-layers = <15>;
  arrows-profiles:
    type: array
    description: |
      レイヤーごとのキーマッピング。
      5個ずつのセットで記述: [layer, key_up, key_down, key_left, key_right]
      複数レイヤーを並べて書ける。

      Linux keycode早見表:
        矢印キー  UP=103 DOWN=108 LEFT=105 RIGHT=106
        PageUp/Down    104 / 109
        Home / End     102 / 107
        Enter          28
        Tab            15
        Escape         1

      例:
        arrows-profiles = <
            3   103 108 105 106   /* layer 3: 矢印キー */
            4   104 109 102 107   /* layer 4: PageUp/Down Home/End */
        >;
  numpad-layers:
    type: array
    description: |
      Layer numbers that activate numpad 2-stroke input mode.
      Example: numpad-layers = <2>;
  numpad-tick:
    type: int
    default: 15
    description: |
      Stroke detection threshold (raw delta). Default 15.
      小さいほど敏感、大きいほど大きく動かさないと反応しない。
  numpad-timeout-ms:
    type: int
    default: 1000
    description: |
      2ストローク目の入力待ちタイムアウト(ms)。
      この時間内に2ストローク目が来なければリセット。Default 1000ms。

  arrows-tick:
    type: int
    default: 10
    description: |
      Raw delta threshold to fire one arrow key event. Default 10.
  arrows-diagonal:
    type: boolean
    description: |
      Allow diagonal arrow key output. When enabled, both X and Y axes can
      fire simultaneously. Default off (dominant axis only).
  arrows-accel:
    type: boolean
    description: |
      Enable acceleration: faster trackball movement reduces the effective
      tick, causing more rapid key firing.
  arrows-accel-max-div:
    type: int
    default: 4
    description: |
      Maximum divisor applied to tick at high speed. Default 4 (tick/4 at peak).
  arrows-accel-threshold:
    type: int
    default: 20
    description: |
      Raw delta magnitude at which max acceleration is reached. Default 20.
  arrows-repeat-delay-ms:
    type: int
    default: 300
    description: |
      Delay before auto-repeat starts when holding a direction (ms).
      Set to 0 to disable auto-repeat. Default 300.
  arrows-repeat-rate-ms:
    type: int
    default: 50
    description: |
      Interval between auto-repeat key events (ms). Default 50.
  scroll-inertia:
    type: boolean
    description: Enable inertia (momentum) scrolling.
  scroll-inertia-decay:
    type: int
    default: 75
    description: |
      Decay % applied when speed is slow (scroll-inertia-slow-spd or below).
      Lower = stops faster. Default: 75.
  scroll-inertia-decay-fast:
    type: int
    default: 92
    description: |
      Decay % applied when speed is fast (scroll-inertia-fast-spd or above).
      Higher = longer glide on fast flicks. Default: 92.
  scroll-inertia-slow-spd:
    type: int
    default: 2
    description: |
      Speed (scroll units/tick) at or below which slow decay applies. Default: 2.
  scroll-inertia-fast-spd:
    type: int
    default: 6
    description: |
      Speed (scroll units/tick) at or above which fast decay applies. Default: 6.
  scroll-inertia-tick-ms:
    type: int
    default: 16
    description: |
      Timer interval for inertia decay in ms. Default 16ms (~60fps).
  scroll-flick-threshold:
    type: int
    default: 6
    description: |
      4-sample average raw delta needed to trigger flick detection.
      Lower = more sensitive. Default: 6.
  scroll-flick-boost:
    type: int
    default: 512
    description: |
      Velocity multiplier applied on flick, in fixed-point *256.
      512 = 2x boost, 384 = 1.5x, 256 = no boost. Default: 512.
  scroll-accel:
    type: boolean
    description: |
      Enable scroll acceleration: amplify scroll delta based on ball speed.
      Slow movement = 1x, fast movement = scroll-accel-max-mult x.
  scroll-accel-max-mult:
    type: int
    default: 4
    description: |
      Maximum scroll multiplier at high speed. Default 4 (4x at threshold).
  scroll-accel-threshold:
    type: int
    default: 20
    description: |
      Raw delta speed at which maximum multiplier is reached. Default 20.
      小さいほど少ない動きで最大倍率に達する。
