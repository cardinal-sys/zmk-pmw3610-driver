description: |
  Sensor driver for the pixart PMW3610 mouse sensor 

compatible: "pixart,pmw3610-alt"

include: spi-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true
  cpi:
    type: int
    default: 600
    description: "CPI value (Range: 200 - 3200, Step: 200)"
  swap-xy:
    type: boolean
  invert-x:
    type: boolean
  invert-y:
    type: boolean
  evt-type:
    type: int
    required: true
  x-input-code:
    type: int
    required: true
  y-input-code:
    type: int
    required: true
  force-awake:
    type: boolean
  force-awake-4ms-mode:
    type: boolean
  scroll-layers:
    type: array
    description: |
      Layer numbers that activate scroll mode.
      Driver emits WHEEL/HWHEEL instead of REL_X/REL_Y.
      Speed controlled by CONFIG_PMW3610_ALT_SCROLL_TICK.
      Example: scroll-layers = <5>;
  snipe-layers:
    type: array
    description: |
      Layer numbers that activate snipe (precision) mode.
      Driver divides cursor movement by CONFIG_PMW3610_ALT_SNIPE_CPI_DIVIDOR,
      with remainder carry-over for lossless precision.
      Example: snipe-layers = <15>;
  arrows-layers:
    type: array
    description: |
      Layer numbers that activate arrows mode.
      Trackball movement is converted to arrow key presses (up/down/left/right).
      Whichever axis has larger displacement wins; diagonal input is suppressed.
      Example: arrows-layers = <3>;
  arrows-tick:
    type: int
    default: 10
    description: |
      Accumulated delta before emitting one arrow key event.
      Smaller value = more sensitive (fires more frequently).
      Range: 1 - 255. Default: 10.
  scroll-inertia:
    type: boolean
    description: |
      Enable inertia (momentum) scrolling.
      When enabled, scroll velocity decays smoothly after the trackball stops.
  scroll-inertia-decay:
    type: int
    default: 85
    description: |
      Velocity retained per timer tick, as a percentage (0-99).
      Higher = slower decay / longer glide. Default: 85 (85% retained each tick).
      Examples: 90 = long glide, 75 = short snappy glide.
  scroll-inertia-tick-ms:
    type: int
    default: 16
    description: |
      Timer interval for inertia decay in milliseconds. Default: 16 (~60fps).
      Smaller = smoother but more CPU. Larger = choppier but lighter.
