description: |
  Sensor driver for the pixart PMW3610 mouse sensor 

compatible: "pixart,pmw3610-alt"

include: spi-device.yaml

properties:
  irq-gpios:
    type: phandle-array
    required: true
  cpi:
    type: int
    default: 600
    description: "CPI value (Range: 200 - 3200, Step: 200)"
  swap-xy:
    type: boolean
  invert-x:
    type: boolean
  invert-y:
    type: boolean
  evt-type:
    type: int
    required: true
  x-input-code:
    type: int
    required: true
  y-input-code:
    type: int
    required: true
  force-awake:
    type: boolean
  force-awake-4ms-mode:
    type: boolean
  scroll-layers:
    type: array
    description: |
      Layer numbers that activate scroll mode.
      Driver emits WHEEL/HWHEEL instead of REL_X/REL_Y.
      Speed controlled by CONFIG_PMW3610_ALT_SCROLL_TICK.
      Example: scroll-layers = <5>;
  snipe-layers:
    type: array
    description: |
      Layer numbers that activate snipe (precision) mode.
      Driver divides cursor movement by CONFIG_PMW3610_ALT_SNIPE_CPI_DIVIDOR,
      with remainder carry-over for lossless precision.
      Example: snipe-layers = <15>;
  arrows-layers:
    type: array
    description: |
      Layer numbers that activate arrows mode.
      Trackball movement is converted to arrow key presses (up/down/left/right).
      Whichever axis has larger displacement wins; diagonal input is suppressed.
      Example: arrows-layers = <3>;
  arrows-tick:
    type: int
    default: 10
    description: |
      Accumulated delta before emitting one arrow key event.
      Smaller value = more sensitive (fires more frequently).
      Range: 1 - 255. Default: 10.
  scroll-inertia:
    type: boolean
    description: Enable inertia (momentum) scrolling.
  scroll-inertia-decay:
    type: int
    default: 75
    description: |
      Decay % applied when speed is slow (scroll-inertia-slow-spd or below).
      Lower = stops faster. Default: 75.
  scroll-inertia-decay-fast:
    type: int
    default: 92
    description: |
      Decay % applied when speed is fast (scroll-inertia-fast-spd or above).
      Higher = longer glide on fast flicks. Default: 92.
  scroll-inertia-slow-spd:
    type: int
    default: 2
    description: |
      Speed (scroll units/tick) at or below which slow decay applies. Default: 2.
  scroll-inertia-fast-spd:
    type: int
    default: 6
    description: |
      Speed (scroll units/tick) at or above which fast decay applies. Default: 6.
  scroll-inertia-tick-ms:
    type: int
    default: 16
    description: Timer interval for inertia decay in ms. Default: 16 (~60fps).
  scroll-flick-threshold:
    type: int
    default: 6
    description: |
      4-sample average raw delta needed to trigger flick detection.
      Lower = more sensitive. Default: 6.
  scroll-flick-boost:
    type: int
    default: 512
    description: |
      Velocity multiplier applied on flick, in fixed-point *256.
      512 = 2x boost, 384 = 1.5x, 256 = no boost. Default: 512.
